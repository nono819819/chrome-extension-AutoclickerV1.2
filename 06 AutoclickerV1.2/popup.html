<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; padding: 15px; font-family: 'Segoe UI', sans-serif; }
    h3 { margin-top: 0; color: #2c3e50; }
    input { width: 100%; margin: 10px 0; padding: 5px; box-sizing: border-box; }
    button { width: 100%; cursor: pointer; padding: 8px; margin-bottom: 5px; border: none; border-radius: 4px; transition: 0.2s; }
    #start { background-color: #27ae60; color: white; }
    #start:hover { background-color: #2ecc71; }
    #stop { background-color: #c0392b; color: white; }
    #stop:hover { background-color: #e74c3c; }
    .status { font-size: 0.85em; font-weight: bold; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h3>AutoClicker</h3>
  <label>Speed (1 - 400 CPS):</label>
  <input type="number" id="cps" value="10" min="1" max="400">
  <button id="start">START</button>
  <button id="stop">STOP</button>
  <div class="status" id="status">Status: Idle</div>
  <script src="popup.js"></script>
</body>
</html>
